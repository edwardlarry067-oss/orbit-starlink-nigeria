    <meta name="twitter:title" content="OrbitFuture — Independent Starlink Solutions &amp; Support" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OrbitFuture",
      "url": "https://orbitfuture.store",
      "logo": "https://orbitfuture.store/favicon.svg",
      "description": "Independent satellite internet solutions company helping customers worldwide order, activate, deploy, and manage Starlink connectivity.",
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "support@orbitfuture.store",
          "availableLanguage": "English",
          "hoursAvailable": {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
            "opens": "00:00",
            "closes": "23:59"
          }
        },
        {
          "@type": "ContactPoint",
          "contactType": "sales",
          "email": "sales@orbitfuture.store",
          "availableLanguage": "English"
        },
        {
          "@type": "ContactPoint",
          "contactType": "billing support",
          "email": "billing@orbitfuture.store",
          "availableLanguage": "English"
        }
      ]
    }
    </script>

    <!-- Structured Data: Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "Starlink Satellite Internet Solutions",
      "provider": {
        "@type": "Organization",
        "name": "OrbitFuture"
      },
      "description": "Independent ordering, activation, deployment and support services for Starlink satellite internet connectivity. Available in 100+ countries worldwide.",
      "areaServed": {
        "@type": "Place",
        "name": "Worldwide"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Starlink Plans",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Starlink Residential" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Starlink Roam" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Starlink Business" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Starlink Maritime" } }
        ]
      }
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is OrbitFuture?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "OrbitFuture is an independent satellite internet solutions company. We help customers worldwide order, activate, deploy, and manage Starlink connectivity. We are not affiliated with SpaceX or Starlink."
          }
        },
        {
          "@type": "Question",
          "name": "How quickly can I get connected with Starlink through OrbitFuture?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most customers are online within 20-30 minutes of receiving their equipment. The Starlink dish self-aligns automatically. Our team provides step-by-step installation support via WhatsApp and email."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a long-term contract with OrbitFuture?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No contracts. All OrbitFuture plans are month-to-month. Cancel anytime with zero fees."
          }
        },
        {
          "@type": "Question",
          "name": "Which countries does OrbitFuture support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "OrbitFuture helps customers access Starlink satellite internet in 100+ countries across North America, Europe, Africa, Asia-Pacific, Latin America, and the Middle East."
          }
        },
        {
          "@type": "Question",
          "name": "Is my payment secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All payments are processed by Paystack, a PCI-DSS Level 1 compliant payment processor. Your card details are never stored on our servers."
          }
        },
        {
          "@type": "Question",
          "name": "What is OrbitFuture's refund policy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Unopened hardware may be returned within 14 days of delivery for a full refund. Monthly service fees are non-refundable once a billing period has started. Cancel anytime before your next billing date with no cancellation fees."
          }
        }
      ]
    }
    </script>

    <!-- PWA / App -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
